worker_processes auto;
events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  # Tell nginx that .geojson is JSON so gzip applies and the browser
  # doesn't treat it as a binary download.
  types {
    application/geo+json  geojson;
  }
  default_type  application/octet-stream;
  sendfile      on;
  tcp_nopush    on;
  tcp_nodelay   on;
  keepalive_timeout 65;
  server_tokens off;

  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/geo+json
    application/xml
    application/rss+xml
    image/svg+xml;

  server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Long cache for hashed Next build assets
    location /_next/static/ {
      access_log off;
      expires 1y;
      add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # SEO: serve the sitemap at the conventional /sitemap.xml as well
    location = /sitemap.xml {
      alias /usr/share/nginx/html/sitemap_uptime.xml;
      default_type application/xml;
      add_header Cache-Control "public, max-age=3600";
    }

    # Modest caching for the original sitemap path + robots.txt — crawlers
    # should pick up changes within an hour.
    location = /sitemap_uptime.xml {
      default_type application/xml;
      add_header Cache-Control "public, max-age=3600";
    }
    location = /robots.txt {
      default_type text/plain;
      add_header Cache-Control "public, max-age=3600";
    }

    # Static assets from public/: same-origin, long cache
    location ~* \.(?:png|jpg|jpeg|gif|svg|webp|avif|ico|woff2?|ttf|eot|css|js|map|geojson|json)$ {
      expires 30d;
      add_header Cache-Control "public, max-age=2592000";
      try_files $uri =404;
    }

    # Trailing-slash routes (Next exports as <route>/index.html)
    location / {
      try_files $uri $uri/ $uri.html $uri/index.html /index.html;
    }

    location = /404.html {
      internal;
    }
    error_page 404 /404.html;
  }
}
